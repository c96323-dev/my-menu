<h1>常見問題 FAQ</h1>

<h2>接睫毛會不舒服嗎？</h2>
<p>
芊光以自然感與舒適度為主，
會依照眼型與睫毛狀態調整，
大部分客人施作時都能放鬆睡著。
</p>

<h2>接睫毛後可以碰水嗎？</h2>
<p>
可以正常洗臉與碰水，
不需要刻意避水，
只要避免過度搓揉即可。
</p>

<h2>新手媽媽適合接睫毛嗎？</h2>
<p>
許多新手媽媽會選擇自然感設計，
讓素顏看起來更有精神，
同時減少早上化妝時間。
</p>

<h2>睫毛管理與嫁接差在哪？</h2>
<p>
嫁接是增加睫毛濃密與造型感，
睫毛管理則偏向自然翹度。
</p>

<h2>第一次接睫毛需要多久？</h2>
<p>
第一次施作通常約 2 ～ 2.5 小時，
包含完整諮詢與眼型設計。
</p>
